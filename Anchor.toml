[toolchain]
anchor_version = "0.31.1"

[features]
seeds      = false
resolution = false
skip-lint  = false

[programs.localnet]
# Generated by `anchor keys sync -p paye-oft` — safe to rotate freely.
paye-oft = "ARdhYxxfEpCbz83j5Y4ubA2bWXMaxWmY2pjehXuFLM5x"

[programs.devnet]
# Replace with the actual devnet program ID after `anchor keys sync -p paye-oft`
# and a successful `make deploy-program-devnet`.
paye-oft = "ARdhYxxfEpCbz83j5Y4ubA2bWXMaxWmY2pjehXuFLM5x"

[programs.mainnet]
# TODO(before-mainnet): set this to the audited mainnet program ID.
# NEVER leave this equal to the devnet ID — `make deploy-mainnet` will refuse
# to proceed if the two IDs match.
# paye-oft = "<MAINNET_PROGRAM_ID_HERE>"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet  = "~/.config/solana/id.json"

[scripts]
test = "npx jest app/tests"

[test]
startup_wait = 30000
